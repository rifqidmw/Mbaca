version: 2.1

orbs:
  android: circleci/android@2.3.0

jobs:
  build:
    docker:
      - image: cimg/android:2024.01.1
    resource_class: large
    steps:
      - checkout
      
      # Set Java 17
      - run:
          name: Set Java version
          command: |
            echo 'export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64' >> $BASH_ENV
            echo 'export PATH=$JAVA_HOME/bin:$PATH' >> $BASH_ENV
            source $BASH_ENV
            java -version
      
      # Download dependencies with cache
      - restore_cache:
          keys:
            - v1-gradle-wrapper-{{ checksum "gradle/wrapper/gradle-wrapper.properties" }}
            - v1-gradle-wrapper-
      - restore_cache:
          keys:
            - v1-gradle-cache-{{ checksum "build.gradle.kts" }}-{{ checksum "app/build.gradle.kts" }}
            - v1-gradle-cache-
      
      - run:
          name: Chmod permissions
          command: chmod +x ./gradlew
      
      - run:
          name: Download Dependencies
          command: ./gradlew androidDependencies --no-daemon
      
      # Build
      - run:
          name: Build Debug APK
          command: ./gradlew assembleDebug --no-daemon --stacktrace
      
      # Run tests
      - run:
          name: Run Tests
          command: ./gradlew test --no-daemon --stacktrace
      
      # Run lint
      - run:
          name: Run Lint
          command: ./gradlew lint --no-daemon --stacktrace
      
      # Save cache
      - save_cache:
          paths:
            - ~/.gradle/wrapper
          key: v1-gradle-wrapper-{{ checksum "gradle/wrapper/gradle-wrapper.properties" }}
      - save_cache:
          paths:
            - ~/.gradle/caches
          key: v1-gradle-cache-{{ checksum "build.gradle.kts" }}-{{ checksum "app/build.gradle.kts" }}
      
      # Store artifacts
      - store_artifacts:
          path: app/build/outputs/apk/debug/
          destination: apk
      
      - store_artifacts: 
          path: app/build/reports
          destination: reports
      
      # Store test results
      - store_test_results:
          path: app/build/test-results

workflows:
  build-and-test:
    jobs:
      - build

